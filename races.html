<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Race History | Nirmal Lamsal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .table-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 2rem;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-top: 2rem;
        }
        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            font-family: var(--font-heading);
            color: var(--text-main);
            background: rgba(0,0,0,0.02);
            font-weight: 600;
        }
        tr:hover {
            background: rgba(0,0,0,0.01);
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-family: var(--font-heading); color: var(--text-main);">Complete Race History</h2>
                <a href="index.html#marathons" class="btn btn-outline">← Back to Site</a>
            </div>

            <table id="races-table">
                <thead>
                    <tr>
                        <th>RaceName</th>
                        <th>Type</th>
                        <th>Participation</th>
                        <th>Distance (KM)</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="races-body">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-muted);">Loading race data from database...</td></tr>
                </tbody>
            </table>
            
            <p id="table-note" style="text-align: center; color: var(--text-muted); margin-top: 1.5rem; font-size: 0.9rem; display: none;">
                * Update main.js with your Google Apps Script URL to load real data.
            </p>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('races-body');
            const note = document.getElementById('table-note');

            function formatDisplayTime(timeStr) {
                if (!timeStr) return '-';
                if (timeStr.includes('T') && timeStr.includes('Z')) {
                    try {
                        const d = new Date(timeStr);
                        const hh = String(d.getHours()).padStart(2, '0');
                        const mm = String(d.getMinutes()).padStart(2, '0');
                        const ss = String(d.getSeconds()).padStart(2, '0');
                        return `${hh}:${mm}:${ss}`;
                    } catch(e) {}
                }
                return timeStr;
            }

            // Need to get the script URL from main.js or hardcode here.
            // Ideally it's a global config, but for now we fetch it by relying on the user setting it up here too,
            // or we can fetch main.js text, but it's simpler to just ask the user to paste it here too if needed,
            // or just use a placeholder text if not provided.
            
            // To make it easy, we just have them set it here.
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxE7Mvk2bFUaL_BCvwhjTsB2FMyxLl-sQGn59cw4c4GRURlD3O6mtQccyEz7hIAGCxTTQ/exec'; 

            if (!SCRIPT_URL) {
                tbody.innerHTML = `
                    <tr>
                        <td>Pangong Frozen Lake Marathon</td>
                        <td>High Altitude Marathon (Extreme)</td>
                        <td>2025</td>
                        <td>42.195</td>
                        <td>--:--</td>
                    </tr>
                    <tr>
                        <td>Pokhara Marathon</td>
                        <td>Road Marathon / City Marathon</td>
                        <td>2018 &middot; 2020 &middot; 2022</td>
                        <td>42.195</td>
                        <td>--:--</td>
                    </tr>
                `;
                note.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                if (data.status === 'success' && data.data.length > 0) {
                    tbody.innerHTML = '';
                    data.data.forEach(race => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong>${race.RaceName || '-'}</strong></td>
                            <td>${race.Type || '-'}</td>
                            <td>${race.Participation || '-'}</td>
                            <td>${race.Distance || '-'}</td>
                            <td>${formatDisplayTime(race.Time)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No race data found.</td></tr>';
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Failed to load race data.</td></tr>';
            }
        });
    </script>
</body>
</html>
