    <rect x="95" y="235" width="10" height="10" rx="2" />
    <rect x="115" y="235" width="25" height="10" rx="2" />
    <rect x="150" y="235" width="10" height="10" rx="2" />
    <rect x="170" y="235" width="15" height="10" rx="2" />
    <rect x="195" y="235" width="15" height="10" rx="2" fill="url(#qr-grad)" />

