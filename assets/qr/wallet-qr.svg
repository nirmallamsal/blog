    <rect x="55" y="165" width="20" height="10" rx="2" />
    <rect x="90" y="165" width="15" height="10" rx="2" />
    <!-- Center buffer -->
    <rect x="195" y="165" width="10" height="10" rx="2" />
    <rect x="215" y="165" width="25" height="10" rx="2" />
    <rect x="250" y="165" width="15" height="10" rx="2" />

