<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="qr-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006973" />
      <stop offset="100%" stop-color="#004850" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="300" rx="16" fill="#ffffff" />
  <rect x="10" y="10" width="280" height="280" rx="12" fill="none" stroke="#f0f4f5" stroke-width="2" />
  
  <!-- Outer Finder Pattern Top-Left -->
  <rect x="35" y="35" width="45" height="45" rx="6" fill="url(#qr-grad)" />
  <rect x="43" y="43" width="29" height="29" rx="4" fill="#ffffff" />
  <rect x="49" y="49" width="17" height="17" rx="2" fill="url(#qr-grad)" />

  <!-- Outer Finder Pattern Top-Right -->
  <rect x="220" y="35" width="45" height="45" rx="6" fill="url(#qr-grad)" />
  <rect x="228" y="43" width="29" height="29" rx="4" fill="#ffffff" />
  <rect x="234" y="49" width="17" height="17" rx="2" fill="url(#qr-grad)" />

  <!-- Outer Finder Pattern Bottom-Left -->
  <rect x="35" y="220" width="45" height="45" rx="6" fill="url(#qr-grad)" />
  <rect x="43" y="228" width="29" height="29" rx="4" fill="#ffffff" />
  <rect x="49" y="234" width="17" height="17" rx="2" fill="url(#qr-grad)" />

  <!-- Alignment Pattern Bottom-Right -->
