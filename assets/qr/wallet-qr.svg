  <!-- Center Logo Placeholder / Icon Overlay -->
  <rect x="120" y="120" width="60" height="60" rx="12" fill="#ffffff" stroke="#f0f4f5" stroke-width="2" />
  <!-- A stylized wallet icon or Nepalese shield/runner symbol inside center -->
  <g transform="translate(130, 130)">
    <!-- eSewa green/Khalti purple style gradient logo -->
    <rect x="3" y="3" width="34" height="34" rx="8" fill="#4fbccb" />
    <!-- Wallet Path -->
    <path d="M12,11 C10.9,11 10,11.9 10,13 L10,27 C10,28.1 10.9,29 12,29 L28,29 C29.1,29 30,28.1 30,27 L30,13 C30,11.9 29.1,11 28,11 L12,11 Z M25,18 C26.1,18 27,18.9 27,20 C27,21.1 26.1,22 25,22 C23.9,22 23,21.1 23,20 C23,18.9 23.9,18 25,18 Z" fill="#ffffff" />
  </g>
</svg>
