    <rect x="190" y="195" width="10" height="10" rx="2" />
    <rect x="210" y="195" width="30" height="10" rx="2" />
    <rect x="250" y="195" width="15" height="10" rx="2" />

    <!-- Row 11 -->
    <rect x="95" y="220" width="20" height="10" rx="2" />
    <rect x="125" y="220" width="10" height="10" rx="2" />
