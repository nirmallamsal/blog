    <rect x="115" y="35" width="20" height="10" rx="2" />
    <rect x="145" y="35" width="10" height="10" rx="2" />
    <rect x="175" y="35" width="15" height="10" rx="2" />
    
    <!-- Row 2 -->
    <rect x="95" y="50" width="15" height="10" rx="2" />
    <rect x="125" y="50" width="10" height="10" rx="2" />
    <rect x="155" y="50" width="20" height="10" rx="2" />
    <rect x="185" y="50" width="10" height="10" rx="2" />

    <!-- Row 3 -->
    <rect x="95" y="65" width="25" height="10" rx="2" />
    <rect x="135" y="65" width="10" height="10" rx="2" />
    <rect x="165" y="65" width="15" height="10" rx="2" />
    <rect x="195" y="65" width="10" height="10" rx="2" />

    <!-- Row 4 -->
    <rect x="35" y="95" width="10" height="10" rx="2" />
    <rect x="55" y="95" width="15" height="10" rx="2" />
    <rect x="85" y="95" width="10" height="10" rx="2" />
    <rect x="105" y="95" width="30" height="10" rx="2" />
    <rect x="145" y="95" width="10" height="10" rx="2" />
    <rect x="175" y="95" width="20" height="10" rx="2" />
    <rect x="210" y="95" width="15" height="10" rx="2" />
    <rect x="235" y="95" width="10" height="10" rx="2" />
    <rect x="255" y="95" width="10" height="10" rx="2" />

    <!-- Row 5 -->
    <rect x="35" y="110" width="20" height="10" rx="2" fill="url(#qr-grad)" />
    <rect x="65" y="110" width="10" height="10" rx="2" />
    <rect x="90" y="110" width="10" height="10" rx="2" />
    <rect x="110" y="110" width="15" height="10" rx="2" />
    <rect x="135" y="110" width="25" height="10" rx="2" />
    <rect x="170" y="110" width="10" height="10" rx="2" />
    <rect x="190" y="110" width="20" height="10" rx="2" fill="url(#qr-grad)" />
    <rect x="220" y="110" width="10" height="10" rx="2" />
    <rect x="245" y="110" width="20" height="10" rx="2" />

