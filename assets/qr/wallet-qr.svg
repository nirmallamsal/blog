    <rect x="35" y="180" width="25" height="10" rx="2" />
    <rect x="70" y="180" width="10" height="10" rx="2" fill="url(#qr-grad)" />
    <rect x="90" y="180" width="20" height="10" rx="2" />
    <rect x="120" y="180" width="15" height="10" rx="2" />
    <rect x="145" y="180" width="10" height="10" rx="2" />
    <rect x="165" y="180" width="20" height="10" rx="2" />
    <rect x="195" y="180" width="10" height="10" rx="2" fill="url(#qr-grad)" />
