    <rect x="55" y="125" width="25" height="10" rx="2" />
    <rect x="95" y="125" width="15" height="10" rx="2" />
    <rect x="120" y="125" width="10" height="10" rx="2" />
    <!-- Center buffer -->
    <rect x="180" y="125" width="15" height="10" rx="2" />
    <rect x="210" y="125" width="20" height="10" rx="2" />
    <rect x="245" y="125" width="10" height="15" rx="2" />

