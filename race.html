<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Race Details | Nirmal Lamsal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#006973",
                        "primary-container": "#4fbccb",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#004850",
                        "surface": "#f6fafb",
                        "on-surface": "#171c1d",
                        "on-surface-variant": "#3d494b",
                        "outline-variant": "#bdc9cb",
                        "background": "#f6fafb",
                        "on-background": "#171c1d"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "outfit": ["Outfit", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f6fafb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(187, 57%, 55%, 0.1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(187, 57%, 85%, 0.05) 0, transparent 50%);
            font-family: 'Inter', sans-serif;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 105, 115, 0.1);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 105, 115, 0.05);
        }
        .edition-toggle[aria-expanded="true"] .toggle-icon { transform: rotate(180deg); }
        .edition-content { display: none; }
        .edition-toggle[aria-expanded="true"] + .edition-content { display: block; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-[1280px] mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white">
                    <span class="material-symbols-outlined">directions_run</span>
                </span>
                <span class="font-outfit text-xl font-bold text-on-surface">Nirmal Lamsal</span>
            </div>
            <a class="flex items-center gap-2 px-5 py-2.5 rounded-full border-2 border-primary text-primary font-semibold hover:bg-primary hover:text-white transition-all duration-300 text-sm" href="races.html">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                Back to History
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-[1280px] mx-auto px-6 py-12 w-full">
        <div id="loading-state" class="flex flex-col items-center justify-center py-32 gap-6">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <p class="text-on-surface-variant font-outfit font-bold text-xl uppercase tracking-widest">Building Athlete Profile...</p>
        </div>

        <div id="main-content" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
            <!-- Hero Section -->
            <div class="flex flex-col md:flex-row items-center gap-10 mb-16">
                <div class="w-32 h-32 md:w-48 md:h-48 glass-card rounded-3xl p-6 flex items-center justify-center overflow-hidden">
                    <img id="race-logo" src="" alt="Race Logo" class="w-full h-full object-contain">
                </div>
                <div class="text-center md:text-left">
                    <div class="flex flex-wrap justify-center md:justify-start gap-3 mb-4">
                        <span id="race-location-tag" class="px-4 py-1 bg-primary/10 text-primary rounded-full text-xs font-black uppercase tracking-wider border border-primary/20 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            <span id="race-location-text">---</span>
                        </span>
                    </div>
                    <h1 id="race-name" class="font-outfit text-5xl md:text-7xl font-extrabold text-on-surface mb-2">---</h1>
                    <p id="race-type-text" class="text-primary-container font-outfit text-xl font-bold tracking-wide uppercase">---</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <!-- Left: Content -->
                <div class="lg:col-span-7 space-y-10">
                    <!-- Intro / About -->
                    <div id="race-intro-card" class="glass-card p-10 rounded-3xl hidden">
                        <h3 class="font-outfit text-2xl font-bold mb-4 flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">info</span>
                            About the Race
                        </h3>
                        <div id="race-intro-text" class="text-on-surface-variant text-lg leading-relaxed"></div>
                    </div>

                    <div class="space-y-6">
                        <h2 class="font-outfit text-3xl font-bold text-on-surface mb-4 flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">history</span>
                            My Performance History
                        </h2>
                        <div id="editions-container" class="space-y-4"></div>
                    </div>

                    <div class="glass-card p-10 rounded-3xl">
                        <h3 class="font-outfit text-2xl font-bold mb-6 flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">notes</span>
                            My Personal Notes
                        </h3>
                        <div id="race-notes" class="text-on-surface-variant text-lg leading-relaxed space-y-4"></div>
                    </div>
                </div>

                <!-- Right: Sidebar -->
                <div class="lg:col-span-5 space-y-10">
                    <div class="glass-card p-10 rounded-3xl">
                        <h3 class="font-outfit text-2xl font-bold mb-6 flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">photo_library</span>
                            Moments Captured
                        </h3>
                        <div id="race-gallery" class="grid grid-cols-2 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[#0F172A] text-white mt-20 p-12 text-center">
        <h3 class="font-outfit text-2xl font-bold mb-2">Nirmal Lamsal</h3>
        <p class="text-slate-500">Every finish line is the start of a new race.</p>
    </footer>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxE7Mvk2bFUaL_BCvwhjTsB2FMyxLl-sQGn59cw4c4GRURlD3O6mtQccyEz7hIAGCxTTQ/exec';

        function slugify(v) {
            return String(v||'').trim().toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');
        }

        function formatTime(t) {
            if (!t) return '-';
            if (String(t).includes('T') && String(t).includes('Z')) {
                try {
                    const d = new Date(t);
                    return [d.getHours(),d.getMinutes(),d.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
                } catch(e) {}
            }
            return t;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const slug = new URLSearchParams(window.location.search).get('race');
            if (!slug) { window.location.href='races.html'; return; }

            try {
                // Fetch both races and master names
                const [racesRes, namesRes] = await Promise.all([
                    fetch(SCRIPT_URL),
                    fetch(`${SCRIPT_URL}?action=names`)
                ]);
                
                const racesData = await racesRes.json();
                const namesData = await namesRes.json();

                if (racesData.status === 'success') {
                    const allMatching = racesData.data.filter(r => slugify(r.RaceName) === slug);
                    if (!allMatching.length) {
                        document.getElementById('loading-state').innerHTML = `<p class='text-error'>Race not found.</p>`;
                        return;
                    }

                    const base = allMatching[0];
                    const master = (namesData.data || []).find(n => n.RaceName.toLowerCase() === base.RaceName.toLowerCase());

                    // Basic Info
                    document.getElementById('race-name').textContent = base.RaceName;
                    document.getElementById('race-type-text').textContent = base.Type;
                    document.getElementById('race-notes').textContent = base.Notes || 'No personal notes recorded.';
                    
                    // Location & Country from NameofRace
                    if (master) {
                        const locText = `${master.Location || ''}, ${master.Country || ''}`.replace(/^,\s*/, '').replace(/,\s*$/, '');
                        document.getElementById('race-location-text').textContent = locText || 'Global Event';
                        
                        // Intro / About
                        if (master.Intro) {
                            document.getElementById('race-intro-card').classList.remove('hidden');
                            document.getElementById('race-intro-text').textContent = master.Intro;
                        }
                    } else {
                        document.getElementById('race-location-tag').classList.add('hidden');
                    }

                    // Logo
                    const logoImg = document.getElementById('race-logo');
                    if (base.Logo) logoImg.src = base.Logo;
                    else logoImg.parentElement.innerHTML = `<span class="material-symbols-outlined text-6xl text-primary/20">sprint</span>`;

                    // Editions
                    const container = document.getElementById('editions-container');
                    allMatching.sort((a,b) => String(b.Participation).localeCompare(String(a.Participation))).forEach((edition, idx) => {
                        const div = document.createElement('div');
                        div.className = 'glass-card overflow-hidden transition-all duration-300';
                        const isPB = edition.PB === 'Yes';
                        div.innerHTML = `
                            <button class="edition-toggle w-full px-8 py-6 flex items-center justify-between text-left group" aria-expanded="${idx === 0}">
                                <div class="flex items-center gap-4">
                                    <span class="text-2xl font-outfit font-black text-primary">${edition.Participation} Edition</span>
                                    ${isPB ? '<span class="px-3 py-1 bg-amber-100 text-amber-700 text-[10px] font-black uppercase rounded-full border border-amber-200">Personal Best</span>' : ''}
                                </div>
                                <span class="material-symbols-outlined transition-transform duration-300 toggle-icon">expand_more</span>
                            </button>
                            <div class="edition-content px-8 pb-8 border-t border-outline-variant/10 pt-6">
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div class="p-4 bg-surface-container-low rounded-xl">
                                        <p class="text-[10px] font-black uppercase text-on-surface-variant tracking-widest mb-1">Finish Time</p>
                                        <p class="font-outfit text-2xl font-bold text-on-surface">${formatTime(edition.Time)}</p>
                                    </div>
                                    <div class="p-4 bg-surface-container-low rounded-xl">
                                        <p class="text-[10px] font-black uppercase text-on-surface-variant tracking-widest mb-1">Distance</p>
                                        <p class="font-outfit text-2xl font-bold text-on-surface">${edition.Distance || '-'}</p>
                                    </div>
                                    <div class="p-4 bg-surface-container-low rounded-xl">
                                        <p class="text-[10px] font-black uppercase text-on-surface-variant tracking-widest mb-1">Overall Position</p>
                                        <p class="font-outfit text-2xl font-bold text-on-surface">${edition.Position || '-'}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.appendChild(div);
                        div.querySelector('.edition-toggle').addEventListener('click', function() {
                            const expanded = this.getAttribute('aria-expanded') === 'true';
                            this.setAttribute('aria-expanded', !expanded);
                        });
                    });

                    // Gallery
                    const galleryEl = document.getElementById('race-gallery');
                    const allLinks = allMatching.flatMap(r => (r.Gallery_Links || '').split(',').map(l=>l.trim()).filter(Boolean));
                    if (allLinks.length) {
                        galleryEl.innerHTML = [...new Set(allLinks)].map(link => `
                            <div class="aspect-square rounded-xl overflow-hidden border border-outline-variant/30 group">
                                <img src="${link}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500 cursor-pointer" onclick="window.open('${link}', '_blank')">
                            </div>
                        `).join('');
                    } else {
                        galleryEl.innerHTML = `<p class="col-span-2 text-on-surface-variant italic text-sm">Gallery coming soon.</p>`;
                    }

                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading-state').innerHTML = `<p class='text-error'>Error syncing data.</p>`;
            }
        });
    </script>
</body>
</html>
